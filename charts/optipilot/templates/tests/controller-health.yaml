{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "optipilot.fullname" . }}-controller-health"
  namespace: {{ include "optipilot.namespace" . }}
  labels:
    {{- include "optipilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: curlimages/curl:8.8.0
      command:
        - /bin/sh
        - -ec
        - |
          curl -fsS "http://{{ include "optipilot.fullname" . }}-controller:{{ .Values.dashboard.service.port }}/api/system/status"
{{- end }}

