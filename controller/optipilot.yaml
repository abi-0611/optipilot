prometheus:
  address: "http://localhost:9090"
  query_timeout_sec: 10

discovery:
  mode: "static"                     # "static" or "kubernetes"
  static_services:
    - name: "api-gateway"
      namespace: "default"
      metrics_port: 8081
      min_replicas: 2
      max_replicas: 15
    - name: "order-service"
      namespace: "default"
      metrics_port: 8082
      min_replicas: 2
      max_replicas: 15
    - name: "payment-service"
      namespace: "default"
      metrics_port: 8083
      min_replicas: 2
      max_replicas: 15
  kubernetes:
    namespace: "default"
    label_selector: "optipilot.io/enabled=true"
    resync_interval_sec: 30

collector:
  interval_sec: 15
  metrics_path: "/metrics"

scaling:
  mode: "shadow"                     # global default: shadow, recommend, autonomous
  scale_up_cooldown_sec: 120
  scale_down_cooldown_sec: 600
  default_min_replicas: 2
  default_max_replicas: 15
  max_change_percent: 50             # rate limit: max 50% replica change per cycle
  headroom_factor: 0.20
  global_kill_switch: false
  rollback_monitoring_minutes: 5
  rollback_error_rate_threshold: 0.02
  rollback_latency_increase_percent: 30
  conservative_mode_minutes: 30

kube:
  kubeconfig_path: ""                 # in-cluster first, then this path, then $KUBECONFIG/~/.kube/config
  kill_switch_configmap_namespace: "" # defaults to service namespace when empty
  kill_switch_configmap_name: ""      # optional; when set, read global/service kill switches
  kill_switch_global_key: "global"
  kill_switch_service_prefix: "service."

forecaster:
  grpc_address: "localhost:50051"
  timeout_sec: 10

dashboard:
  http_port: 8080
  websocket_path: "/ws/events"
  cors_origin: "*"
  static_dir: "../dashboard"

predictor:
  interval_sec: 60
  lookback_minutes: 30
  min_data_points: 10
  ingest_batch_size: 500

storage:
  db_path: "optipilot.db"
  retention_hours: 24
