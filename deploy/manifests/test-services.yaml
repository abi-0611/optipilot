apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
  annotations:
    optipilot.io/enabled: "true"
    optipilot.io/min-replicas: "2"
    optipilot.io/max-replicas: "10"
    optipilot.io/mode: "autonomous"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        optipilot.io/enabled: "true"
        optipilot.io/min-replicas: "2"
        optipilot.io/max-replicas: "10"
        optipilot.io/mode: "autonomous"
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8081
    targetPort: 8081
---
