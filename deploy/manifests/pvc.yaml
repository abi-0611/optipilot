apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: controller-pvc
  namespace: optipilot-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forecaster-pvc
  namespace: optipilot-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
