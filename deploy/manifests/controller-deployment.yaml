apiVersion: apps/v1
kind: Deployment
metadata:
  name: optipilot-controller
  namespace: optipilot-system
  labels:
    app: optipilot-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: optipilot-controller
  template:
    metadata:
      labels:
        app: optipilot-controller
    spec:
      serviceAccountName: optipilot-controller
      containers:
        - name: controller
          image: optipilot-controller:latest
          imagePullPolicy: Never
          args:
            - "-config"
            - "/app/optipilot.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/optipilot.yaml
              subPath: optipilot.yaml
              readOnly: true
            - name: controller-data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: optipilot-config
        - name: controller-data
          persistentVolumeClaim:
            claimName: controller-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: optipilot-controller
  namespace: optipilot-system
spec:
  type: NodePort
  selector:
    app: optipilot-controller
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
      nodePort: 30080
